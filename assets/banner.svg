  </g>

  <text x="60" y="142" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="68" font-weight="800" fill="#1f1f1e" letter-spacing="-2">Claude-BugHunter</text>

  <text x="62" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="400" fill="#5a5a59">Bug Hunting Skills for Claude Code</text>

  <g transform="translate(60, 244)" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="16">
