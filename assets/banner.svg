      <stop offset="0%" stop-color="#faf9f5"/>
      <stop offset="100%" stop-color="#f0ebe0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cc785c"/>
      <stop offset="100%" stop-color="#a85c43"/>
