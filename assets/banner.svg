  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <rect x="0" y="0" width="10" height="320" fill="url(#accent)"/>

  <g transform="translate(960, 160)">
    <circle cx="0" cy="0" r="110" fill="#cc785c" opacity="0.06"/>
    <circle cx="0" cy="0" r="78" fill="#cc785c" opacity="0.12"/>
    <circle cx="0" cy="0" r="46" fill="url(#accent)"/>
    <g stroke="#faf9f5" stroke-width="6" fill="none" stroke-linecap="round" transform="translate(-4, -4)">
